<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Registre suas atividades diárias com o Diário de Bordo." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Diário de Bordo</title>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">⚓</span>
        <h1>Diário de Bordo</h1>
      </div>
      <button id="installBtn" class="install-btn" style="display:none;">
        ＋ Instalar App
      </button>
    </div>
  </header>

  <main class="main">

    <section class="form-section">
      <h2 class="section-title">Nova Entrada</h2>
      <div class="form-card">
        <div class="form-group">
          <label for="entryTitle">Título</label>
          <input type="text" id="entryTitle" placeholder="Dê um título à entrada..." maxlength="80" />
        </div>
        <div class="form-group">
          <label for="entryDate">Data</label>
          <input type="date" id="entryDate" />
        </div>
        <div class="form-group">
          <label for="entryDesc">Descrição</label>
          <textarea id="entryDesc" placeholder="Escreva sobre o seu dia..." rows="4"></textarea>
        </div>
        <button id="addBtn" class="btn-primary">Registrar entrada</button>
      </div>
    </section>

    <section class="list-section">
      <h2 class="section-title">Entradas <span id="entryCount" class="count-badge">0</span></h2>
      <div id="entriesList" class="entries-list">
        <div class="empty-state">
          <span class="empty-icon">🌊</span>
          <p>Nenhuma entrada ainda.<br/>Comece registrando seu dia.</p>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
